name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: output
          fetch-depth: 0
      
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: singlaamitesh
          outputs: github-contribution-grid-snake.svg?palette=github-dark&color_snake=58a6ff&color_dots=1a1b2e,24292e,58a6ff,48b5cd,6bb8f0
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-contribution-grid-snake.svg
          git diff --staged --quiet || git commit -m "🐍 Update contribution snake"
          git push origin output
